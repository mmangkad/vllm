# MLA prefill backend comparison for GLM-style dimensions.
#
# Compares the current FlashAttention default with TRT-LLM Ragged on the wider
# MLA dimensions newly accepted by TRT-LLM Ragged:
#   qk_nope_head_dim=192, qk_rope_head_dim=64, v_head_dim=256
#
# On Blackwell, FlashAttention resolves to FA2 for this shape because the
# QK prefill head size is 192 + 64 = 256, which exceeds FA4's current TMEM
# capacity limits.
#
# This mirrors the broad workload coverage in configs/mla_prefill.yaml while
# keeping the backend set limited to implementations that support this shape.
#
# Usage:
#   python benchmark.py --config configs/mla_prefill_glm_dims.yaml

description: "MLA prefill FlashAttention default vs TRT-LLM Ragged on GLM-style dimensions"

model:
  name: "glm-5.2"
  num_layers: 78
  num_q_heads: 64
  num_kv_heads: 1
  head_dim: 576
  kv_lora_rank: 512
  qk_nope_head_dim: 192
  qk_rope_head_dim: 64
  v_head_dim: 256
  block_size: 128

batch_specs:
  # Pure prefill
  - "q512"
  - "q1k"
  - "q2k"
  - "q4k"
  - "q8k"

  # Batched pure prefill
  - "2q512"
  - "2q1k"
  - "2q2k"
  - "2q4k"
  - "2q8k"
  - "4q512"
  - "4q1k"
  - "4q2k"
  - "4q4k"
  - "4q8k"
  - "8q512"
  - "8q1k"
  - "8q2k"
  - "8q4k"
  - "8q8k"

  # Chunked prefill / extend
  # Short context
  - "q128s1k"
  - "q256s2k"
  - "q512s4k"
  - "q1ks4k"
  - "q2ks8k"
  - "2q128s1k"
  - "2q256s2k"
  - "2q512s4k"
  - "2q1ks4k"
  - "2q2ks8k"
  - "4q128s1k"
  - "4q256s2k"
  - "4q512s4k"
  - "4q1ks4k"
  - "4q2ks8k"
  - "8q128s1k"
  - "8q256s2k"
  - "8q512s4k"
  - "8q1ks4k"

  # Medium context
  - "q128s16k"
  - "q512s16k"
  - "q1ks16k"
  - "q2ks16k"
  - "2q128s16k"
  - "2q512s16k"
  - "2q1ks16k"
  - "2q2ks16k"
  - "4q128s16k"
  - "4q512s16k"
  - "4q1ks16k"
  - "4q2ks16k"

  # Long context
  - "q128s64k"
  - "q512s64k"
  - "q1ks64k"
  - "q2ks64k"
  - "2q128s64k"
  - "2q512s64k"
  - "2q1ks64k"
  - "2q2ks64k"

decode_backends:
  - CUTLASS_MLA

prefill_backends:
  - flash_attn
  - trtllm

device: "cuda:0"
cuda_graphs: true

output:
  csv: "/tmp/mla_prefill_flashattn_vs_trtllm_glm_dims.csv"
